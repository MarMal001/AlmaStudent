<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css"> 
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <title>Login</title>
</head>
<body>
    <header class="p-5 bg-primary text-white text-center">
        <div class="d-inline-flex">
            <img src="images/logo.png" class="img-fluid" alt="">
            <h1>AlmaStudent</h1>
        </div>
    </header>
    <main class="row align-items-center text-white text-center">
        <div class="col-xl col"></div>
        <div class="col-xl-3 col-5 bg-primary text-center text-white rounded-4">
            <form action="#" method="post" class="py-5">
                <h2>Accedi al tuo account</h2>
                <ul>
                    <li>
                        <label for="username" class="text-left">
                            <h5>Username</h5>
                        </label>
                    </li>
                    <li>
                        <input type="text" id="username" name="username">
                    </li>
                    <li>
                        <label for="password" class="text-left">
                            <h5>Password</h5>
                        </label>
                    </li>
                    <li>
                        <input type="password" id="password" name="password">
                    </li>
                    <li>
                        <input type="submit" class="btn btn-outline-primary bg-white text-primary" value="Accedi">
                    </li>
                </ul>
            </form>
        </div>
        <div class="col-xl col"></div>
    </main>
    <footer class="container-fluid p-2 bg-primary text-white text-center">© Copyright 2026 - ALMA MATER STUDIORUM - Università di Bologna</footer>
</body>
</html>
